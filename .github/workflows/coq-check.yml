name: Coq Verification

on:
  push:
  pull_request:

jobs:
  check-coq:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q --no-install-recommends coq

      - name: Compile all .v files in order
        run: |
          set -e
          FILES=$(find . -name "*.v" -type f | sort)
          if [ -z "$FILES" ]; then
            echo "No .v files found."
            exit 1
          fi

          for file in $FILES; do
            echo "::group::Compiling $file"
            if coqc "$file"; then
              echo "✅ $file compiled successfully."
            else
              echo "::error::Compilation failed for $file"
              exit 1
            fi
            echo "::endgroup::"
          done
