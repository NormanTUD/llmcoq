name: Coq Verification

on:
  push:
  pull_request:

jobs:
  check-coq:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Coq
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q --no-install-recommends coq

      - name: Compile all .v files in order
        run: |
          set -e
          # Map the current directory (.) to the logical name 'base'
          # Use -Q . base if you don't want subdirectories to be recursive
          # Use -R . base if you want recursive mapping
          
          FILES=$(find . -name "*.v" -type f | sort)
          
          for file in $FILES; do
            echo "::group::Compiling $file"
            if coqc -Q . base "$file"; then
              echo "✅ $file compiled successfully."
            else
              echo "::error::Compilation failed for $file"
              exit 1
            fi
            echo "::endgroup::"
          done
